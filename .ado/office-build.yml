# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: vs2017-win2016

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

- powershell: ls "env:"
  displayName: Print Environment

- powershell: ls -directory "$env:Path" | %{$_.FullName}
  displayName: Print Path

- powershell: ls -directory "$env:ProgramFiles" | %{$_.FullName}
  displayName: Print ProgramFile content

- powershell: ls -directory "${env:ProgramFiles(x86)}" | %{$_.FullName}
  displayName: Print ProgramFile-x86 content

- powershell: Write-Host "Agent.ToolsDirectory='$(Agent.ToolsDirectory)'"
  displayName: Print Agent.ToolsDirectory

- task: NuGetCommand@2
  displayName: Dummy NuGet restore
  inputs:
    command: 'restore'
    feedsToUse: 'non_existing_find_nuget_path'
    restoreSolution: '**/*.sln'

- task: PowerShell@2
  displayName: Build RNW via Office tools
  inputs:
    targetType: filePath
    filePath: $(Build.SourcesDirectory)\vnext\Scripts\OfficeBuild.ps1
    arguments: build -ADOLog

- script: |
    echo Add other tasks to build, test, and deploy your project.
    echo See https://aka.ms/yaml
  displayName: 'Run a multi-line script'
