# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

variables:
  - template: variables/msbuild.yml
  - template: variables/vs2017.yml

pool:
  vmImage: vs2017-win2016

# This step creates the NuGetExeToolPath variable passed into the Office build step below.
steps:
- task: NuGetToolInstaller@0
  inputs:
    versionSpec: ">=4.6.0"

# This step establishes the credentials needed for the NuGet install step run as part of the Office
# build step below.
- task: NuGetAuthenticate@0
  continueOnError: true
  inputs:
    nuGetServiceConnections: OfficeNuGetFeed

- task: CmdLine@2
  displayName: yarn install
  inputs:
    script: yarn install --frozen-lockfile

- task: CmdLine@2
  displayName: yarn build
  inputs:
    script: yarn build

- task: NuGetCommand@2
  displayName: NuGet restore
  inputs:
    command: restore
    restoreSolution: vnext/ReactWindows-Desktop.sln
    feedsToUse: config
    nugetConfigPath: $(Build.SourcesDirectory)/vnext/NuGet.config
    restoreDirectory: packages/
    verbosityRestore: Detailed # Options: quiet, normal, detailed

# Even though the Office build step should not consume any files installed with this step, it is
# nevertheless needed to satisfy SDK checks performed by the MSBuild infrastructure engaged through
# the Office build step below.
- template: templates\install-SDK.yml
  parameters:
    sdkVersion: $(Win10Version)

# For pipeline diagnostics, can be removed.
- powershell: |
    Write-Host "Free space on C drive: $((Get-PSDrive 'C').Free/1GB) GB"
    Write-Host "Free space on D drive: $((Get-PSDrive 'D').Free/1GB) GB"
  continueOnError: true
  displayName: Check free disk space

- task: PowerShell@2
  displayName: Build RNW via Office tools
  inputs:
    targetType: filePath
    filePath: $(Build.SourcesDirectory)\vnext\Scripts\OfficeBuild.ps1
    # The Office build packages collectively require about 9.25 GB. With the vs2017-win2016 images,
    # we appear to operate on agents where the working drive (D:) has only about 11 GB of free space
    # to begin with. With the "regular" RNW build dependency packages present, the installation of
    # the Office build packages causes the working drive to run out of space.
    # With 7.05 GB, VisualCppTools.InternalAddCHPE.VS2017Layout is the biggest offender among the
    # Office build packages. According to Thomas Wise, this package is provided by DevDiv; we would
    # have to ask them to split it up. Alternatively, we could attempt to remove unneeded parts
    # after its installation. For now, we're working around the disk space limits by installing the
    # Office build packages to the system rather than the working drive (-PackageTargetDirectory
    # argument below).
    arguments: build -ADOLog -PackageTargetDirectory 'C:\RNWOfficeBuildPackages' -NugetCmd $(NuGetExeToolPath) -MSBuildCmd 'C:\Program Files (x86)\Microsoft Visual Studio\2017\Enterprise\MSBuild\15.0\Bin\msbuild.exe'

- task: VSTest@2
  displayName: Run Desktop Unit Tests
  timeoutInMinutes: 5 # Set smaller timeout, due to hangs
  inputs:
    testSelector: testAssemblies
    testAssemblyVer2: |
      React.Windows.Desktop.UnitTests/React.Windows.Desktop.UnitTests.dll
      JSI.Desktop.UnitTests/JSI.Desktop.UnitTests.exe
    pathtoCustomTestAdapters: $(GoogleTestAdapterPath)
    searchFolder: $(Build.SourcesDirectory)/vnext/target/x64/Debug # $(Build.SourcesDirectory)/vnext/target/$(BuildPlatform)/$(BuildConfiguration)
    runTestsInIsolation: true
    platform: x64 # $(BuildPlatform)
    configuration: Debug # $(BuildConfiguration)
    publishRunAttachments: true
    collectDumpOn: onAbortOnly
    vsTestVersion: toolsInstaller
